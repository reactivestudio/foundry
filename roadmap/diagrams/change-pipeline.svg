<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 826" role="img">
<title>Путь change по конвейеру</title>
<style>
text{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif}
.th{font-size:14px;font-weight:600;fill:#444441}
.ts{font-size:12px;fill:#7a7a72}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
.dash{fill:none;stroke:#b4b2a9;stroke-width:1;stroke-dasharray:6 4}
.gray>rect{fill:#F1EFE8;stroke:#5F5E5A}
.gray .th{fill:#2C2C2A}.gray .ts{fill:#5F5E5A}
.purple>rect{fill:#EEEDFE;stroke:#534AB7}
.purple .th{fill:#26215C}.purple .ts{fill:#534AB7}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="ts" x="340" y="20" text-anchor="middle" dominant-baseline="central">каждая стадия крутится в лупе ревью до нуля замечаний (см. цепочку запуска)</text>
<g class="gray"><rect x="190" y="44" width="300" height="44" rx="8" stroke-width="1"/><text class="th" x="340" y="66" text-anchor="middle" dominant-baseline="central">proposal.md — спека change</text></g>
<line x1="340" y1="88" x2="340" y2="106" class="arr" marker-end="url(#arrow)"/>
<g class="purple"><rect x="190" y="112" width="300" height="52" rx="8" stroke-width="1"/><text class="th" x="340" y="130" text-anchor="middle" dominant-baseline="central">01 questions</text><text class="ts" x="340" y="149" text-anchor="middle" dominant-baseline="central">вопросы к коду</text></g>
<line x1="340" y1="164" x2="340" y2="186" class="arr" marker-end="url(#arrow)"/>
<g class="purple"><rect x="190" y="192" width="300" height="52" rx="8" stroke-width="1"/><text class="th" x="340" y="210" text-anchor="middle" dominant-baseline="central">02 research</text><text class="ts" x="340" y="229" text-anchor="middle" dominant-baseline="central">факты file:line, слеп к задаче</text></g>
<line x1="340" y1="244" x2="340" y2="266" class="arr" marker-end="url(#arrow)"/>
<g class="purple"><rect x="190" y="272" width="300" height="52" rx="8" stroke-width="1"/><text class="th" x="340" y="290" text-anchor="middle" dominant-baseline="central">03 design</text><text class="ts" x="340" y="309" text-anchor="middle" dominant-baseline="central">гейт: deep review + контракт приёмки</text></g>
<line x1="340" y1="324" x2="340" y2="346" class="arr" marker-end="url(#arrow)"/>
<g class="purple"><rect x="190" y="352" width="300" height="52" rx="8" stroke-width="1"/><text class="th" x="340" y="370" text-anchor="middle" dominant-baseline="central">04 structure</text><text class="ts" x="340" y="389" text-anchor="middle" dominant-baseline="central">атомарные задачи (vertical)</text></g>
<line x1="340" y1="404" x2="340" y2="430" class="arr" marker-end="url(#arrow)"/>
<rect x="150" y="436" width="380" height="268" rx="8" class="dash"/>
<text class="ts" x="340" y="452" text-anchor="middle" dominant-baseline="central">на каждую задачу из structure:</text>
<g class="purple"><rect x="190" y="468" width="300" height="52" rx="8" stroke-width="1"/><text class="th" x="340" y="486" text-anchor="middle" dominant-baseline="central">05 plan</text><text class="ts" x="340" y="505" text-anchor="middle" dominant-baseline="central">гейт: spot-check</text></g>
<line x1="340" y1="520" x2="340" y2="542" class="arr" marker-end="url(#arrow)"/>
<g class="purple"><rect x="190" y="548" width="300" height="52" rx="8" stroke-width="1"/><text class="th" x="340" y="566" text-anchor="middle" dominant-baseline="central">06 implement</text><text class="ts" x="340" y="585" text-anchor="middle" dominant-baseline="central">код в ветке · гейт: code review</text></g>
<line x1="340" y1="600" x2="340" y2="622" class="arr" marker-end="url(#arrow)"/>
<g class="purple"><rect x="190" y="628" width="300" height="52" rx="8" stroke-width="1"/><text class="th" x="340" y="646" text-anchor="middle" dominant-baseline="central">07 verify</text><text class="ts" x="340" y="665" text-anchor="middle" dominant-baseline="central">слеп к design · гейт: approve</text></g>
<line x1="340" y1="704" x2="340" y2="728" class="arr" marker-end="url(#arrow)"/>
<g class="gray"><rect x="190" y="734" width="300" height="52" rx="8" stroke-width="1"/><text class="th" x="340" y="752" text-anchor="middle" dominant-baseline="central">PR + документация</text><text class="ts" x="340" y="771" text-anchor="middle" dominant-baseline="central">финальный approve → done</text></g>
</svg>
