<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 552" role="img">
<title>Хранилище и доступ к нему</title>
<style>
text{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif}
.th{font-size:14px;font-weight:600;fill:#444441}
.ts{font-size:12px;fill:#7a7a72}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
.dash{fill:none;stroke:#b4b2a9;stroke-width:1;stroke-dasharray:6 4}
.teal>rect{fill:#E1F5EE;stroke:#0F6E56}
.teal .th{fill:#085041}.teal .ts{fill:#0F6E56}
.gray>rect{fill:#F1EFE8;stroke:#5F5E5A}
.gray .th{fill:#2C2C2A}.gray .ts{fill:#5F5E5A}
.purple>rect{fill:#EEEDFE;stroke:#534AB7}
.purple .th{fill:#26215C}.purple .ts{fill:#534AB7}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="teal"><rect x="250" y="40" width="180" height="44" rx="8" stroke-width="1"/><text class="th" x="340" y="62" text-anchor="middle" dominant-baseline="central">foundry-desktop</text></g>
<line x1="340" y1="84" x2="340" y2="114" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="98" dominant-baseline="central">сканирует, fs-watch</text>
<path d="M250 62 L100 62 L100 276" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="108" y="170" dominant-baseline="central">мутации</text>
<text class="ts" x="108" y="186" dominant-baseline="central">через CLI</text>
<rect x="170" y="120" width="340" height="380" rx="8" class="dash"/>
<text class="ts" x="340" y="140" text-anchor="middle" dominant-baseline="central">~/.foundry — одна точка правды</text>
<g class="gray"><rect x="200" y="156" width="280" height="40" rx="8" stroke-width="1"/><text class="th" x="340" y="176" text-anchor="middle" dominant-baseline="central">cwd → projects/*/project.yaml</text></g>
<rect x="190" y="216" width="300" height="264" rx="8" class="dash"/>
<text class="ts" x="340" y="234" text-anchor="middle" dominant-baseline="central">projects/&lt;id&gt;/</text>
<g class="gray"><rect x="210" y="252" width="260" height="64" rx="8" stroke-width="1"/><text class="th" x="340" y="274" text-anchor="middle" dominant-baseline="central">changes/&lt;slug&gt;/</text><text class="ts" x="340" y="296" text-anchor="middle" dominant-baseline="central">proposal · tracking · history</text></g>
<g class="gray"><rect x="210" y="332" width="260" height="64" rx="8" stroke-width="1"/><text class="th" x="340" y="354" text-anchor="middle" dominant-baseline="central">stages/NN-стадия/</text><text class="ts" x="340" y="376" text-anchor="middle" dominant-baseline="central">input · output · rounds/vN</text></g>
<g class="gray"><rect x="210" y="412" width="260" height="40" rx="8" stroke-width="1"/><text class="th" x="340" y="432" text-anchor="middle" dominant-baseline="central">feedback/&lt;stage&gt;.jsonl</text></g>
<g class="gray"><rect x="40" y="280" width="120" height="56" rx="8" stroke-width="1"/><text class="th" x="100" y="299" text-anchor="middle" dominant-baseline="central">foundry CLI</text><text class="ts" x="100" y="318" text-anchor="middle" dominant-baseline="central">мутации</text></g>
<line x1="160" y1="308" x2="164" y2="308" class="arr" marker-end="url(#arrow)"/>
<g class="purple"><rect x="520" y="280" width="120" height="56" rx="8" stroke-width="1"/><text class="th" x="580" y="299" text-anchor="middle" dominant-baseline="central">агенты</text><text class="ts" x="580" y="318" text-anchor="middle" dominant-baseline="central">артефакты</text></g>
<line x1="520" y1="308" x2="516" y2="308" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="528" text-anchor="middle" dominant-baseline="central">код проекта — отдельно, в git; в репозитории foundry не оставляет ничего</text>
</svg>
