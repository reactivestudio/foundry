<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 208" role="img">
<title>Цикл самоулучшения</title>
<style>
text{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif}
.th{font-size:14px;font-weight:600;fill:#444441}
.ts{font-size:12px;fill:#7a7a72}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
.leader{stroke:#a5a59c;stroke-width:1;stroke-dasharray:5 4;fill:none}
.pink>rect{fill:#FBEAF0;stroke:#993556}
.pink .th{fill:#4B1528}.pink .ts{fill:#993556}
.gray>rect{fill:#F1EFE8;stroke:#5F5E5A}
.gray .th{fill:#2C2C2A}.gray .ts{fill:#5F5E5A}
.teal>rect{fill:#E1F5EE;stroke:#0F6E56}
.teal .th{fill:#085041}.teal .ts{fill:#0F6E56}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="pink"><rect x="40" y="60" width="135" height="64" rx="8" stroke-width="1"/><text class="th" x="107" y="82" text-anchor="middle" dominant-baseline="central">правки ревью</text><text class="ts" x="107" y="102" text-anchor="middle" dominant-baseline="central">reviews/vN</text></g>
<line x1="175" y1="92" x2="187" y2="92" class="arr" marker-end="url(#arrow)"/>
<g class="gray"><rect x="193" y="60" width="135" height="64" rx="8" stroke-width="1"/><text class="th" x="260" y="82" text-anchor="middle" dominant-baseline="central">дельты копятся</text><text class="ts" x="260" y="102" text-anchor="middle" dominant-baseline="central">feedback/*.jsonl</text></g>
<line x1="328" y1="92" x2="340" y2="92" class="arr" marker-end="url(#arrow)"/>
<g class="teal"><rect x="346" y="60" width="135" height="64" rx="8" stroke-width="1"/><text class="th" x="413" y="82" text-anchor="middle" dominant-baseline="central">черновик патча</text><text class="ts" x="413" y="102" text-anchor="middle" dominant-baseline="central">skill/agent/rule</text></g>
<line x1="481" y1="92" x2="493" y2="92" class="arr" marker-end="url(#arrow)"/>
<g class="pink"><rect x="499" y="60" width="135" height="64" rx="8" stroke-width="1"/><text class="th" x="566" y="82" text-anchor="middle" dominant-baseline="central">твой approve</text><text class="ts" x="566" y="102" text-anchor="middle" dominant-baseline="central">→ git</text></g>
<path d="M566 124 L566 156 L107 156 L107 130" class="leader" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="176" text-anchor="middle" dominant-baseline="central">следующий change — та же стадия проходит за меньше лупов</text>
</svg>
