<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 508" role="img">
<title>Карта системы: приложения и вызовы</title>
<style>
text{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif}
.th{font-size:14px;font-weight:600;fill:#444441}
.ts{font-size:12px;fill:#7a7a72}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
.leader{stroke:#a5a59c;stroke-width:1;stroke-dasharray:5 4;fill:none}
.teal>rect{fill:#E1F5EE;stroke:#0F6E56}
.teal .th{fill:#085041}.teal .ts{fill:#0F6E56}
.gray>rect{fill:#F1EFE8;stroke:#5F5E5A}
.gray .th{fill:#2C2C2A}.gray .ts{fill:#5F5E5A}
.purple>rect{fill:#EEEDFE;stroke:#534AB7}
.purple .th{fill:#26215C}.purple .ts{fill:#534AB7}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="ts" x="200" y="24" text-anchor="middle" dominant-baseline="central">fs-watch + hooks-сигнал</text>
<path d="M110 430 L44 430 L44 36 L340 36 L340 58" class="leader" marker-end="url(#arrow)"/>
<g class="teal"><rect x="52" y="64" width="176" height="56" rx="8" stroke-width="1"/><text class="th" x="140" y="83" text-anchor="middle" dominant-baseline="central">терминал</text><text class="ts" x="140" y="102" text-anchor="middle" dominant-baseline="central">механика руками</text></g>
<g class="teal"><rect x="250" y="64" width="180" height="56" rx="8" stroke-width="1"/><text class="th" x="340" y="83" text-anchor="middle" dominant-baseline="central">foundry-desktop</text><text class="ts" x="340" y="102" text-anchor="middle" dominant-baseline="central">доска, ревью, аналитика</text></g>
<g class="teal"><rect x="452" y="64" width="180" height="56" rx="8" stroke-width="1"/><text class="th" x="542" y="83" text-anchor="middle" dominant-baseline="central">claude-desktop</text><text class="ts" x="542" y="102" text-anchor="middle" dominant-baseline="central">смотреть процесс агента</text></g>
<line x1="140" y1="120" x2="185" y2="234" class="arr" marker-end="url(#arrow)"/>
