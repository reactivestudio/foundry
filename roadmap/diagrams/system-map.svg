<g class="purple"><rect x="390" y="240" width="200" height="56" rx="8" stroke-width="1"/><text class="th" x="490" y="259" text-anchor="middle" dominant-baseline="central">Claude Code</text><text class="ts" x="490" y="278" text-anchor="middle" dominant-baseline="central">агенты стадий</text></g>
