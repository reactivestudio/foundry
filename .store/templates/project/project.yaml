# Проект в сторе. Разворачивается в projects/<id>/ при `setup` в каталоге
# репозитория. id = имя репозитория; совпало с чужим — суффикс -2.
# path — где репозиторий лежит сейчас. Переехал проект — правится эта строка,
# и больше ничего: данные проекта в сторе, а не в нём.
id: __ID__
name: __NAME__
path: __PATH__
created_at: __TIMESTAMP__
updated_at: __TIMESTAMP__
